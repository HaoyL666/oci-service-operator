    #
    apiVersion: controller-runtime.sigs.k8s.io/v1alpha1
    kind: ControllerManagerConfiguration
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: 127.0.0.1:8080
    webhook:
      port: 9443
    leaderElection:
      leaderElect: true
      resourceName: 40558063.oci.core
kind: ConfigMap
metadata:
  name: oci-service-operator-core-manager-config
  namespace: oci-service-operator-core-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: core-controller-manager
  name: oci-service-operator-core-controller-manager
  namespace: oci-service-operator-core-system
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: core-controller-manager
  template:
    metadata:
      labels:
        control-plane: core-controller-manager
    spec:
      containers:
      - args:
        - --leader-elect
        - --config=controller_manager_config.yaml
        command:
        - /manager
        env:
        - name: USER
          valueFrom:
            secretKeyRef:
              key: user
              name: ocicredentials
              optional: true
        - name: TENANCY
          valueFrom:
            secretKeyRef:
              key: tenancy
              name: ocicredentials
              optional: true
        - name: REGION
          valueFrom:
            secretKeyRef:
              key: region
              name: ocicredentials
              optional: true
        - name: FINGERPRINT
          valueFrom:
            secretKeyRef:
              key: fingerprint
              name: ocicredentials
              optional: true
        - name: PASSPHRASE
          valueFrom:
            secretKeyRef:
              key: passphrase
              name: ocicredentials
              optional: true
        - name: PRIVATEKEY
          valueFrom:
            secretKeyRef:
              key: privatekey
              name: ocicredentials
              optional: true
        - name: USEINSTANCEPRINCIPAL
          valueFrom:
            secretKeyRef:
              key: useinstanceprincipal
              name: osokconfig
        image: iad.ocir.io/oracle/oci-service-operator-core:latest
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 300Mi
          requests:
            cpu: 500m
            memory: 200Mi
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
        - mountPath: /controller_manager_config.yaml
          name: manager-config
          subPath: controller_manager_config.yaml
        - mountPath: /etc/pki
          name: pki
          readOnly: true
      securityContext:
        runAsUser: 65532
      terminationGracePeriodSeconds: 10
      volumes:
      - configMap:
          name: oci-service-operator-core-manager-config
        name: manager-config
      - hostPath:
          path: /etc/pki
        name: pki
