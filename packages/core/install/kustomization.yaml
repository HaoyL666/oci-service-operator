apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: oci-service-operator-core-system
namePrefix: oci-service-operator-core-

resources:
- generated/crd
- generated/rbac
- ../../../config/manager/core
- ../../../config/rbac/role_binding.yaml
- ../../../config/rbac/leader_election_role.yaml
- ../../../config/rbac/leader_election_role_binding.yaml
- ../../../config/rbac/vcn_editor_role.yaml
- ../../../config/rbac/vcn_viewer_role.yaml
- ../../../config/webhook
- ../../../config/certmanager

patches:
  - path: ../../../config/default/webhookcainjection_patch.yaml
  - path: webhook_mount_patch.yaml
  - path: manager_config_patch.yaml
