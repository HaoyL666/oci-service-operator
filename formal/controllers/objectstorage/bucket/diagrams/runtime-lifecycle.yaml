schemaVersion: 1
surface: repo-authored-semantics
service: objectstorage
slug: bucket
kind: Bucket
archetype: generated-service-manager
states:
  - active
  - updating
  - terminating
notes:
  - Generatedruntime resolves bucketName and namespaceName from observed status first, then falls back to the published Bucket spec.
  - Successful create and update responses without lifecycle fields are treated as synchronous success and projected directly into status.
  - Delete keeps the finalizer until DeleteBucket succeeds and GetBucket confirms NotFound.
