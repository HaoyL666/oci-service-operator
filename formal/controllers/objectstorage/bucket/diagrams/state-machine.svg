etica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2259.23" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2259.23" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.1787" x="2259.23" y="182.7803">service: objectstorage</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="74.71" x="2259.23" y="196.7803">slug: bucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="76.2617" x="2259.23" y="210.7803">kind: Bucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2259.23" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="156.4063" x="2259.23" y="238.7803">status/finalizer: required /</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.3027" x="2259.23" y="252.7803">retain-until-confirmed-delete</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.9092" x="2259.23" y="266.7803">requeue: updating, terminating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="263.0674" x="2259.23" y="280.7803">provider states: create none; update none;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.1787" x="2259.23" y="294.7803">delete none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="282.4883" x="2259.23" y="308.7803">supported drift: auto_tiering, compartment_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.292" x="2259.23" y="322.7803">defined_tags, freeform_tags (+7 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2259.23" y="336.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="73.9307" x="2259.23" y="350.7803">storage_tier</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.1436" x="2259.23" y="364.7803">list lookup: oci_objectstorage_buckets filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="223.3369" x="2259.23" y="378.7803">name, namespace, compartment_id</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2259.23" y="392.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.3164" x="2259.23" y="406.7803">open gaps: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.5918" x="2259.23" y="420.7803">Generatedruntime resolves bucketName and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="305.8057" x="2259.23" y="434.7803">namespaceName from observed status first, then</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.1436" x="2259.23" y="448.7803">falls back to the published Bucket spec.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="301.1846" x="2259.23" y="462.7803">Successful create and update responses without</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.9092" x="2259.23" y="476.7803">lifecycle fields are treated as synchronous</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="259.1299" x="2259.23" y="490.7803">success and projected directly into status.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="273.9297" x="2259.23" y="504.7803">Delete keeps the finalizer until DeleteBucket</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.6953" x="2259.23" y="518.7803">succeeds and GetBucket confirms NotFound.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="89" id="ent0006"><path d="M2940.71,593 L2940.71,600.81 L2480.79,584.25 L2940.71,608.81 L2940.71,629 A8,8 0 0 0 2948.71,637 L3210.5088,637 A8,8 0 0 0 3218.5088,629 L3218.5088,595 L3208.5088,585 L2948.71,585 A8,8 0 0 0 2940.71,593" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><path d="M3208.5088,585 L3208.5088,591 A4,4 0 0 0 3212.5088,595 L3218.5088,595 L3208.5088,585" fill="#FFF7D6" style="stroke:#B45309;stroke-width:0.5;"/><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9717" x="2946.71" y="600.7803">delete policy: required</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="256.7988" x="2946.71" y="614.7803">delete observe: GetBucket or ListBuckets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="157.1855" x="2946.71" y="628.7803">delete targets: DELETED</text></g><!--link *start* to observe--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk3"><path d="M26.2,532 C49.21,532 105.71,532 165.54,532" fill="none" id="*start*-to-observe" style="stroke:#0F172A;stroke-width:1;"/><polygon fill="#0F172A" points="171.54,532,162.54,528,166.54,532,162.54,536,171.54,532" style="stroke:#0F172A;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" l