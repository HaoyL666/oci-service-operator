# formal controller binding schema v1
schema_version = 1
surface = repo-authored-semantics
service = core
slug = networksecuritygroup
kind = NetworkSecurityGroup
stage = seeded
import = imports/core/networksecuritygroup.json
shared_contracts = shared/BaseReconcilerContract.tla,shared/ControllerLifecycleSpec.tla,shared/OSOKServiceManagerContract.tla,shared/SecretSideEffectsContract.tla
status_projection = required
success_condition = active
# OCI mapping: provisioning => PROVISIONING, updating => literal UPDATING fallback, terminating => TERMINATING
# Observed TERMINATED is documented in logic-gaps/import metadata because the spec schema only
# accepts provisioning, updating, and terminating requeue buckets.
requeue_conditions = provisioning,updating,terminating
delete_confirmation = required
finalizer_policy = retain-until-confirmed-delete
secret_side_effects = none
