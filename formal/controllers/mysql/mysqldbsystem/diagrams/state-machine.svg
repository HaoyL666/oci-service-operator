amily="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.4336" x="2892.09" y="112.7803">targets, and failure exits here.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="281.709" x="2892.09" y="126.7803">archetype batch: Generated service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.9229" x="2892.09" y="140.7803">controllers map provider states into the shared</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="261.4609" x="2892.09" y="154.7803">controller phases with explicit finalizer and</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="105.8477" x="2892.09" y="168.7803">requeue policies.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="88.6826" x="2892.09" y="182.7803">service: mysql</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="129.9307" x="2892.09" y="196.7803">slug: mysqldbsystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.9307" x="2892.09" y="210.7803">kind: MySqlDbSystem</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2402" x="2892.09" y="224.7803">archetype: generated-service-manager</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="185.9922" x="2892.09" y="238.7803">status/finalizer: manual / none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="195.3643" x="2892.09" y="252.7803">requeue: provisioning, updating</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="298.7441" x="2892.09" y="266.7803">provider states: create CREATING, UPDATING;</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="238.875" x="2892.09" y="280.7803">update UPDATING; delete DELETING</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.5439" x="2892.09" y="294.7803">supported drift: access_mode,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="385.2529" x="2892.09" y="308.7803">backup_policy.copy_policies.backup_copy_retention_in_days,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="280.1777" x="2892.09" y="322.7803">backup_policy.copy_policies.copy_to_region,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="245.54" x="2892.09" y="336.7803">backup_policy.defined_tags (+50 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="230.3301" x="2892.09" y="350.7803">reject before mutate: force-new fields</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6748" x="2892.09" y="364.7803">admin_password, admin_username,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="299.1953" x="2892.09" y="378.7803">availability_domain, compartment_id (+12 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.4404" x="2892.09" y="392.7803">list lookup: oci_mysql_mysql_db_systems filters</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.8955" x="2892.09" y="406.7803">compartment_id, configuration_id,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="306.2295" x="2892.09" y="420.7803">database_management, db_system_id (+4 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="89.4961" x="2892.09" y="434.7803">conflicts: none</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="192.999" x="2892.09" y="448.7803">open gaps: bind-versus-create,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="279.3711" x="2892.09" y="462.7803">delete-confirmation, endpoint-materialization,</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="229.9199" x="2892.09" y="476.7803">list-lookup, mutation-policy (+2 more)</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="287.1436" x="2892.09" y="490.7803">Create reads username and password secrets</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="213.999" x="2892.09" y="504.7803">before submitting the OCI request.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="278.6123" x="2892.09" y="518.7803">Endpoint secret materialization only happens</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="234.9717" x="2892.09" y="532.7803">after the DB system reaches ACTIVE.</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="312.8672" x="2892.09" y="546.7803">Delete remains an unsupported legacy path, so no</text><text fill="#334155" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="258.3506" x="2892.09" y="560.7803">confirmed terminating phase exists today.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="99" id="ent0006"><path d="M3627.35,621 L3627.35,642.34 L3140.61,626.1 L3627.35,650.34 L3627.35,685 A8,8 0 0 0 3635.35,693 L3940.6938,693 A8,8 0 0 0 3948.6938,685 L3948.6938,623 L3938.6938,613 L3635.35,613 A8,8 0 0 0 3627.35,621" fill="#FFF7D6" style="stroke:#B4