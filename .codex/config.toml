# Project-scoped Codex configuration
# Multi-agent: planner spawns planner_draft + planner_review as sub-agents

[features]
multi_agent = true

[agents]
max_threads = 4
max_depth = 1

[agents.planner_draft]
description = "Designs task decompositions and writes plan to agnts/plans/draft.md. NEVER writes to beads. Read-only except for the plan file."
config_file = "agents/planner_draft.toml"

[agents.planner_review]
description = "Reviews plan drafts against approval checklist. ONLY agent allowed to run bd create / bd dep add (single-writer rule)."
config_file = "agents/planner_review.toml"
