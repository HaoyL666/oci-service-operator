  - service: containerengine
    sdkPackage: github.com/oracle/oci-go-sdk/v65/containerengine
    group: containerengine
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: controller-backed
    defaultControllerImage: iad.ocir.io/oracle/oci-service-operator-containerengine:latest
    managerOverlay: ../../../config/manager/containerengine
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
    observedState:
      sdkAliases:
        WorkRequestLog:
          - WorkRequestLogEntry

  - service: core
    sdkPackage: github.com/oracle/oci-go-sdk/v65/core
    group: core
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: controller-backed
    defaultControllerImage: iad.ocir.io/oracle/oci-service-operator-core:latest
    managerOverlay: ../../../config/manager/core
    packageSplits:
      - name: core-network
        defaultControllerImage: iad.ocir.io/oracle/oci-service-operator-core-network:latest
        includeKinds:
          - InternetGateway
          - NatGateway
          - NetworkSecurityGroup
          - RouteTable
          - SecurityList
          - ServiceGateway
          - Subnet
          - Vcn
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: none
    observedState:
      sdkAliases:
        AllDrgAttachment:
          - DrgAttachmentInfo
        AllowedPeerRegionsForRemotePeering:
          - PeerRegionForRemotePeering
        AppCatalogListingAgreement:
          - AppCatalogListingResourceVersionAgreements
        ClusterNetworkInstance:
          - InstanceSummary
        ComputeCapacityReservationInstance:
          - CapacityReservationInstanceSummary
        ComputeGlobalImageCapabilitySchema:
          - ComputeGlobalImageCapabilitySchemaVersionSummary
        CrossConnectLetterOfAuthority:
          - LetterOfAuthority
        CrossConnectMapping:
          - CrossConnectMappingDetails
        CrossconnectPortSpeedShape:
          - CrossConnectPortSpeedShape
        DhcpOption:
          - DhcpOptions
        FastConnectProviderVirtualCircuitBandwidthShape:
          - VirtualCircuitBandwidthShape
        IPSecConnectionTunnelError:
          - IpSecConnectionTunnelErrorDetails
        IPSecConnectionTunnelRoute:
          - TunnelRouteSummary
        IPSecConnectionTunnelSecurityAssociation:
          - TunnelSecurityAssociationSummary
        InstanceDevice:
          - Device
        NetworkSecurityGroupSecurityRule:
          - SecurityRule
        VirtualCircuitAssociatedTunnel:
          - VirtualCircuitAssociatedTunnelDetails
        VolumeBackupPolicyAssetAssignment:
          - VolumeBackupPolicyAssignment
        WindowsInstanceInitialCredential:
          - InstanceCredentials

  - service: database
    sdkPackage: github.com/oracle/oci-go-sdk/v65/database
    group: database
    version: v1beta1
    phase: parity
    sampleOrder: 10
    packageProfile: controller-backed
    parityFile: parity/database.yaml
    defaultControllerImage: iad.ocir.io/oracle/oci-service-operator-database:latest
    managerOverlay: ../../../config/manager/database
    compatibility:
      existingKinds:
        - AutonomousDatabases
    generation:
      controller:
        strategy: generated
      serviceManager:
        strategy: generated
      registration:
        strategy: generated
      webhooks:
        strategy: manual
      resources:
        - kind: AutonomousDatabases
          controller:
            extraRBACMarkers:
              - groups="",resources=secrets,verbs=get;list;watch;create;update;patch;delete
              - groups="",resources=events,verbs=get;list;watch;create;update;patch;delete
          serviceManager:
            packagePath: autonomousdatabases/adb
          webhooks:
            strategy: manual

