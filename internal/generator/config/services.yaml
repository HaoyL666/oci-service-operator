# Source-of-truth service map for the OSOK API generator contract.
schemaVersion: v1alpha1
domain: oracle.com
defaultVersion: v1beta1
generatorEntrypoint: ./cmd/osok-api-generator

packageProfiles:
  controller-backed:
    description: Existing groups with hand-maintained controllers wired into the shared manager.
  crd-only:
    description: Generated API groups that ship CRDs and samples before controller support exists.

services:
  - service: artifacts
    sdkPackage: github.com/oracle/oci-go-sdk/v65/artifacts
    group: artifacts
    version: v1beta1
    phase: data-and-storage
    packageProfile: crd-only

  - service: certificates
    sdkPackage: github.com/oracle/oci-go-sdk/v65/certificates
    group: certificates
    version: v1beta1
    phase: security-and-identity
    packageProfile: crd-only

  - service: certificatesmanagement
    sdkPackage: github.com/oracle/oci-go-sdk/v65/certificatesmanagement
    group: certificatesmanagement
    version: v1beta1
    phase: security-and-identity
    packageProfile: crd-only

  - service: containerengine
    sdkPackage: github.com/oracle/oci-go-sdk/v65/containerengine
    group: containerengine
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: crd-only

  - service: core
    sdkPackage: github.com/oracle/oci-go-sdk/v65/core
    group: core
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: controller-backed
    defaultControllerImage: iad.ocir.io/oracle/oci-service-operator-core:latest
    managerOverlay: ../../../config/manager/core
    controller:
      registerFunc: Core
      resources:
        - kind: Vcn
          controllerType: VcnReconciler
          legacyFieldName: DisplayNameOld
          controllerLogName: Vcn
          recorderName: Vcn
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/core/vcn
            alias: vcn
            constructor: 'vcn.NewVcnServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("Vcn")}, deps.Metrics)'
        - kind: Subnet
          controllerType: SubnetReconciler
          legacyFieldName: DisplayNameOld
          controllerLogName: Subnet
          recorderName: Subnet
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/core/subnet
            alias: subnet
            constructor: 'subnet.NewSubnetServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("Subnet")}, deps.Metrics)'
        - kind: RouteTable
          controllerType: RouteTableReconciler
          legacyFieldName: DisplayNameOld
          controllerLogName: RouteTable
          recorderName: RouteTable
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/core/routetable
            alias: routetable
            constructor: 'routetable.NewRouteTableServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("RouteTable")}, deps.Metrics)'
        - kind: InternetGateway
          controllerType: InternetGatewayReconciler
          legacyFieldName: DisplayNameOld
          controllerLogName: InternetGateway
          recorderName: InternetGateway
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/core/internetgateway
            alias: internetgateway
            constructor: 'internetgateway.NewInternetGatewayServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("InternetGateway")}, deps.Metrics)'
        - kind: NatGateway
          controllerType: NatGatewayReconciler
          legacyFieldName: DisplayNameOld
          controllerLogName: NatGateway
          recorderName: NatGateway
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/core/natgateway
            alias: natgateway
            constructor: 'natgateway.NewNatGatewayServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("NatGateway")}, deps.Metrics)'
        - kind: SecurityList
          controllerType: SecurityListReconciler
          legacyFieldName: DisplayNameOld
          controllerLogName: SecurityList
          recorderName: SecurityList
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/core/securitylist
            alias: securitylist
            constructor: 'securitylist.NewSecurityListServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("SecurityList")}, deps.Metrics)'
        - kind: NetworkSecurityGroup
          controllerType: NetworkSecurityGroupReconciler
          legacyFieldName: DisplayNameOld
          controllerLogName: NetworkSecurityGroup
          recorderName: NetworkSecurityGroup
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/core/networksecuritygroup
            alias: networksecuritygroup
            constructor: 'networksecuritygroup.NewNetworkSecurityGroupServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("NetworkSecurityGroup")}, deps.Metrics)'

  - service: database
    sdkPackage: github.com/oracle/oci-go-sdk/v65/database
    group: database
    version: v1beta1
    phase: parity
    sampleOrder: 10
    packageProfile: controller-backed
    parityFile: parity/database.yaml
    defaultControllerImage: iad.ocir.io/oracle/oci-service-operator-database:latest
    managerOverlay: ../../../config/manager/database
    controller:
      registerFunc: Database
      resources:
        - kind: AutonomousDatabases
          controllerType: AutonomousDatabasesReconciler
          legacyFieldName: DbNameOld
          controllerLogName: AutonomousDatabases
          recorderName: AutonomousDatabases
          webhook: true
          additionalRBAC:
            - groups: ""
              resources: secrets
              verbs: get;list;watch;create;update;patch;delete
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/autonomousdatabases/adb
            alias: adb
            constructor: 'adb.NewAdbServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("AutonomousDatabases")})'
    compatibility:
      existingKinds:
        - AutonomousDatabases

  - service: dns
    sdkPackage: github.com/oracle/oci-go-sdk/v65/dns
    group: dns
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: crd-only

  - service: events
    sdkPackage: github.com/oracle/oci-go-sdk/v65/events
    group: events
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: crd-only

  - service: functions
    sdkPackage: github.com/oracle/oci-go-sdk/v65/functions
    group: functions
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: crd-only

  - service: identity
    sdkPackage: github.com/oracle/oci-go-sdk/v65/identity
    group: identity
    version: v1beta1
    phase: security-and-identity
    packageProfile: crd-only

  - service: keymanagement
    sdkPackage: github.com/oracle/oci-go-sdk/v65/keymanagement
    group: keymanagement
    version: v1beta1
    phase: security-and-identity
    packageProfile: crd-only

  - service: limits
    sdkPackage: github.com/oracle/oci-go-sdk/v65/limits
    group: limits
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: crd-only

  - service: loadbalancer
    sdkPackage: github.com/oracle/oci-go-sdk/v65/loadbalancer
    group: loadbalancer
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: crd-only

  - service: logging
    sdkPackage: github.com/oracle/oci-go-sdk/v65/logging
    group: logging
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: crd-only

  - service: monitoring
    sdkPackage: github.com/oracle/oci-go-sdk/v65/monitoring
    group: monitoring
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: crd-only

  - service: mysql
    sdkPackage: github.com/oracle/oci-go-sdk/v65/mysql
    group: mysql
    version: v1beta1
    phase: parity
    sampleOrder: 30
    packageProfile: controller-backed
    parityFile: parity/mysql.yaml
    defaultControllerImage: iad.ocir.io/oracle/oci-service-operator-mysql:latest
    managerOverlay: ../../../config/manager/mysql
    controller:
      registerFunc: MySQL
      resources:
        - kind: MySqlDbSystem
          controllerType: MySqlDBsystemReconciler
          legacyFieldName: DisplayNameOld
          maxConcurrentReconciles: 3
          controllerLogName: MySqlDbSystem
          recorderName: MySqlDbSystem
          additionalRBAC:
            - groups: ""
              resources: secrets
              verbs: get;list;watch;create;update;patch;delete
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/mysql/dbsystem
            alias: dbsystem
            constructor: 'dbsystem.NewDbSystemServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("MySqlDbSystem")})'
    compatibility:
      existingKinds:
        - MySqlDbSystem

  - service: networkloadbalancer
    sdkPackage: github.com/oracle/oci-go-sdk/v65/networkloadbalancer
    group: networkloadbalancer
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: crd-only

  - service: nosql
    sdkPackage: github.com/oracle/oci-go-sdk/v65/nosql
    group: nosql
    version: v1beta1
    phase: data-and-storage
    packageProfile: crd-only

  - service: objectstorage
    sdkPackage: github.com/oracle/oci-go-sdk/v65/objectstorage
    group: objectstorage
    version: v1beta1
    phase: data-and-storage
    packageProfile: crd-only

  - service: ons
    sdkPackage: github.com/oracle/oci-go-sdk/v65/ons
    group: ons
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: controller-backed
    defaultControllerImage: iad.ocir.io/oracle/oci-service-operator-ons:latest
    managerOverlay: ../../../config/manager/ons
    controller:
      registerFunc: ONS
      resources:
        - kind: Topic
          controllerType: TopicReconciler
          controllerLogName: Topic
          recorderName: Topic
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/ons/topic
            alias: topic
            constructor: 'topic.NewTopicServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("Topic")}, deps.Metrics)'
        - kind: Subscription
          controllerType: SubscriptionReconciler
          controllerLogName: Subscription
          recorderName: Subscription
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/ons/subscription
            alias: subscription
            constructor: 'subscription.NewSubscriptionServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("Subscription")}, deps.Metrics)'
        - kind: ConfirmSubscription
          controllerType: ConfirmSubscriptionReconciler
          controllerLogName: ConfirmSubscription
          recorderName: ConfirmSubscription
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/ons/confirmsubscription
            alias: confirmsubscription
            constructor: 'confirmsubscription.NewConfirmSubscriptionServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("ConfirmSubscription")}, deps.Metrics)'
        - kind: Unsubscription
          controllerType: UnsubscriptionReconciler
          controllerLogName: Unsubscription
          recorderName: Unsubscription
          additionalRBAC:
            - groups: ""
              resources: events
              verbs: get;list;watch;create;update;patch;delete
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/ons/unsubscription
            alias: unsubscription
            constructor: 'unsubscription.NewUnsubscriptionServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("Unsubscription")}, deps.Metrics)'

  - service: psql
    sdkPackage: github.com/oracle/oci-go-sdk/v65/psql
    group: psql
    version: v1beta1
    phase: data-and-storage
    packageProfile: crd-only

  - service: queue
    sdkPackage: github.com/oracle/oci-go-sdk/v65/queue
    group: queue
    version: v1beta1
    phase: eventing-messaging-and-observability
    packageProfile: crd-only

  - service: secrets
    sdkPackage: github.com/oracle/oci-go-sdk/v65/secrets
    group: secrets
    version: v1beta1
    phase: security-and-identity
    packageProfile: crd-only

  - service: streaming
    sdkPackage: github.com/oracle/oci-go-sdk/v65/streaming
    group: streaming
    version: v1beta1
    phase: parity
    sampleOrder: 20
    packageProfile: controller-backed
    parityFile: parity/streaming.yaml
    defaultControllerImage: iad.ocir.io/oracle/oci-service-operator-streaming:latest
    managerOverlay: ../../../config/manager/streaming
    controller:
      registerFunc: Streaming
      resources:
        - kind: Stream
          controllerType: StreamReconciler
          legacyFieldName: StreamNameOld
          controllerLogName: Streams
          recorderName: Streams
          serviceManager:
            import: github.com/oracle/oci-service-operator/pkg/servicemanager/streams
            alias: streams
            constructor: 'streams.NewStreamServiceManager(deps.Provider, deps.CredClient, deps.Scheme, loggerutil.OSOKLogger{Logger: ctrl.Log.WithName("service-manager").WithName("Streams")}, deps.Metrics)'
    compatibility:
      existingKinds:
        - Stream

  - service: vault
    sdkPackage: github.com/oracle/oci-go-sdk/v65/vault
    group: vault
    version: v1beta1
    phase: security-and-identity
    packageProfile: crd-only

  - service: workrequests
    sdkPackage: github.com/oracle/oci-go-sdk/v65/workrequests
    group: workrequests
    version: v1beta1
    phase: networking-and-infrastructure
    packageProfile: crd-only
